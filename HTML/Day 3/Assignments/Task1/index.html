<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }
        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 5px;
        }
        th {
            background: #333;
            color: white;
        }
        img {
            width:50%;
            height: 50%;
            object-fit: cover;
        }
        audio{
            width: 350px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>Shape of You</td>
            <td><img src="image.png" alt="Shape of You"></td>
            <td><audio src="shapeofyou.mp3" controls autoplay muted></audio></td>
            <td><video src="shapeofyou.mp4" controls height="150px" width="250px" autoplay muted></video></td>
        </tr>
        <tr>
            <td>Blinding Lights</td>
            <td><img src="image1.png" alt="Blinding Lights"></td>
            <td><audio src="blindinglights.mp3" controls autoplay muted></audio></td>
            <td><video src="blindinglights.mp4" controls height="150px" width="250px" autoplay muted></video></td>
        </tr>
    </table>
</body>
</html>
