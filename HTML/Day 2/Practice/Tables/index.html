<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="1" cellpadding="10px" cellspacing="20px" style="border-collapse: collapse;">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Akhil</td>
            <td>25</td>
            <td>Hyderabad</td>
        </tr>
        <tr>
            <td>Rohit</td>
            <td>30</td>
            <td>Mumbai</td>
        </tr>
        <tr>
            <td>Sneha</td>
            <td>28</td>
            <td>Bangalore</td>
        </tr>
    </table>
</body>
</html>
