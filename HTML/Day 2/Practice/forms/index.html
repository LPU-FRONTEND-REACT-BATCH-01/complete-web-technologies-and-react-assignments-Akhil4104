<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="">
        <label for="username">Username:</label> 
        <input type="text" name="username" id="username" placeholder="Username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" name="password" id="password" placeholder="Password"><br><br>
        <label for="gender">Gender:</label>
        Male<input type="radio" name="gender" value="male"> Female<input type="radio" name="gender" value="female"><br><br>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Email"><br><br>
        <label for="skills">Skills:</label>
        React <input type="checkbox" id="react" name="skills" value="react"> HTML <input type="checkbox" id="html" name="skills" value="html"> CSS <input type="checkbox" id="css" name="skills" value="css"><br><br>
        <button type="button">Click Me</button>
        <input type="file">
        <input type="datetime-local">
        <input type="time">
        <select name="country" id="country">
            <option value="">Select Country</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
        </select>

        <select name="country" id="country">
            <optgroup label="Asia">
                <option value="india">India</option>
                <option value="china">China</option>
            </optgroup>
            <optgroup label="North America">
                <option value="usa">USA</option>
                <option value="canada">Canada</option>
            </optgroup>
        </select>

        <textarea placeholder="Enter your message here..."></textarea>
        <input type="date" min="2026-04-02" max="2026-04-30">
        <input type="range" min="0" max="100">
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
