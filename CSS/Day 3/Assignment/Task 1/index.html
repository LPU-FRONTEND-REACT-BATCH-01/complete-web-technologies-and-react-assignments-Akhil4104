<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.navbar {
    background-color: #1e1e1e;
    padding: 15px 0;
    position: sticky;
    top: 0;
}

.tags {
    display: flex;
    justify-content: center;
    gap: 40px;
    list-style: none;
    margin: 0;
    padding: 0;
}

.tags li a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    padding: 8px 15px;
}

.tags li a:hover {
    background-color: #00bcd4;
    border-radius: 5px;
    color: black;
}
</style>

</head>

<body>

<nav class="navbar">
    <ul class="tags">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

</body>
</html>
