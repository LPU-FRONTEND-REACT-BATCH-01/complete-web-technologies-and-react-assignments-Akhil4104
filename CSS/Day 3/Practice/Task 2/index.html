<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
         
         .container{
            width:500px;
            height:500px;
            background-color:bisque;
            position: relative;
            left:20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap:40px;
            border-radius:40px;

            /*
            display:grid;
            grid-template-rows:150px 150px 150px;
            grid-template-columns:150px 150px 150px;
            align-content:center;
            align-items:center;
            justify-content:center;
            justify-content:center;
            grid-auto-flow:column;
            grid-auto-columns:150px;
            grid-auto-rows:150px;


            .item1{
            grid-row-start:1;
            grid-row-end:2;

            grid-column-start:1;
            grid-column-end:3;

            */

        }

        .item{
            width: 100px;
            height: 100px;
            background-color: rgb(87, 223, 177);
            border:5px solid black;
            border-radius: 20px;
        }

        .items1{
            flex-shrink:1;
            flex-grow:2;
            align-self:flex-start;
        }
        .items2{
            flex-shrink:2;
            flex-grow:1;
            order:3;
        }
        .items3{
            flex-basis: 200px;
        }
        


    </style>
</head>
<body>
    <div class="container">
        <div class="items1 item">Item 1</div>
        <div class="items2 item">Item 2</div>
        <div class="items3 item">Item 3</div>
    </div>
</body>
</html>
