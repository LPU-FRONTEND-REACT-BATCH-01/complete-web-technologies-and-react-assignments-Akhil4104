<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4</title>
    <style>
        a:link{
            color:green;
        }
        a:visited{
            color:blue;
        }
        a:active{
            color:red;
        }
        h1:hover{
            color:orange;
        }
        input:focus{
            border:2px solid lightblue;
        }
        input:hover{
            background-color: lightskyblue;
        }
        h1:before{
            content: "Learning Css is fun! ";
            display: block;
            color:blueviolet;
        }
        h1:after{
            content:"practiced Css today!";
            display: block;
            color:lightblue;
        }
    </style>
</head>
<body>
    <a href="https://amazon.com">Amazon</a>
    <h1>Website</h1>
    <input type="text">
</body>
</html>
