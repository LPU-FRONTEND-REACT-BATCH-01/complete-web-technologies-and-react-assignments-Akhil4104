<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=ul, initial-scale=1.0">
    <title>Task 5</title>
    <style>
        ul h1:first-child{
            background-color: aquamarine;
        }
        ul li:last-child{
            background-color: blue;
        }
        ul li:nth-child(4){
            background-color: green;
        }
        ul li:first-of-type{
            background-color: lightcoral;
        }
        ul li:last-of-type{
            background-color: lightblue;
        }
         ul li:nth-of-type(2){
            background-color: lightpink;
        }
    </style>
</head>
<body>
   <ul>
    <h1>List of Fruits</h1>
    <li>Apple</li>
    <li>Banana</li>
    <li>Grapes</li>
    <li>kiwi</li>
   </ul> 
</body>
</html>
