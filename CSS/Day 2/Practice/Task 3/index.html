<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        .box{
            height:200px;
            width:300px;
            padding:15px;
            border:2px solid black;
        }
        .box1{
            box-sizing: border-box;
            background-color: aqua;
            border-radius: 40px 20px;
        }
        .box2{
            box-sizing: content-box;
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <div class="box1 box"> border-box</div>
    <div class="box2 box"> content-box</div>
</body>
</html>
