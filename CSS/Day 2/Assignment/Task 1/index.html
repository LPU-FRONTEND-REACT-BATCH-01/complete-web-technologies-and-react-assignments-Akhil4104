<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1</title>
    <style>
        .card {
            width: 600px;
            height: 400px;
            background-color: #f0f0f0;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quote {
            text-align: center;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .quote p:first-child {
            font-size: 1.5em;
            font-weight: bold;
            
        }
        .card:hover .quote p:first-child {
            color: grey;
            letter-spacing:2px;
        }

        .quote p:first-child::first-letter {
            font-weight: bold;
            font-size: 40px;
            color: blue;
        }
        .author{
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 2px;
            color: grey;
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="card">
        <div class="quote">
            <p>The only way to do great work is to love what you do.</p>
            <p class="author">-Steve Jobs</p>
        </div>
    </div>
</body>
</html>
